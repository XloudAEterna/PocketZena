version: "3.9"

services:
  development:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile-backend
    init: true
    ports:
      - "8000:8000"
    environment:
      - DB_BASEDIR=/app/db/development/
      - CACHE_BASEDIR=/app/db/development/
    volumes:
      # Live reload: mount the source over the copied files
      - ../:/app
      #- src/requirements.txt:/app/requirements.txt:ro
    # Override the Dockerfile CMD so --reload picks up the mounted source
    #command: ["cd", "src/backend", "&&", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    working_dir: /app
    command: ["sleep", "infinity"]

  frontend:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile-frontend
      args:
        APP_ENV: dev
    init: true
    ports:
      - "8080:80"
    volumes:
      # Live reload of static assets
      - ../src/frontend:/usr/share/nginx/html:ro
      # Overlay the dev config at /config.js (the root mount would otherwise hide it)
      - ../src/frontend/config/config.dev.js:/usr/share/nginx/html/config.js:ro
