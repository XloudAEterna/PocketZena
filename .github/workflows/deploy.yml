name: Deploy Main Branch

on:
  push:
    branches:
      - main

jobs:
  sync-code:
    runs-on: self-hosted
    steps:
      - name: Synchronize Repository to Work Directory
        run: |
          set -euo pipefail

          if [ ! -d "/root/pocketzena/.git" ]; then
            # Clean directory to ensure a pristine initial clone target
            rm -rf /root/pocketzena
            git clone -b main https://github.com/xloudaeterna/pocketzena.git /root/pocketzena
          else
            cd /root/pocketzena
            git fetch origin main
            # Override local changes automatically to prevent pipeline blocks during student testing
            git reset --hard origin/main
          fi

  build-code:
    runs-on: self-hosted
    needs: sync-code
    steps:
      - name: Build our containers on our server from the latest code tagging them as latest
        run: |
          set -euo pipefail
          cd /root/pocketzena
          buildah bud --layers -t localhost/pocketzena-main-fe:latest -f deployment/container/Dockerfile-frontend ./
          buildah bud --layers -t localhost/pocketzena-main-be:latest -f deployment/container/Dockerfile-backend ./

  deploy-containers:
    runs-on: self-hosted
    needs: build-code
    steps:
      - name: deploy our containers on our server from the latest container tag
        run: |
          set -euo pipefail
          podman run --replace --name pocketzena-backend -p 8000:8000 -d -v /root/pocketzena-data:/data -e DB_BASEDIR=/data -e CACHE_BASEDIR=/data localhost/pocketzena-main-be:latest
          podman run --replace --name pocketzena-frontend -p 80:80 -d localhost/pocketzena-main-fe:latest